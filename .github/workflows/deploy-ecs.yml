name: 🚀 部署到阿里云ECS服务器

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 拉取代码
        uses: actions/checkout@v4
      
      - name: ✅ 代码拉取验证
        run: |
          echo "✅ 代码拉取成功，当前分支：$(git rev-parse --abbrev-ref HEAD)"
          echo "✅ 最新提交：$(git log -1 --pretty=format:'%s')"

      - name: 🟢 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: ✅ Node.js环境验证
        run: |
          echo "✅ Node.js 版本：$(node -v)"
          echo "✅ NPM 版本：$(npm -v)"

      - name: 📥 安装项目依赖
        run: npm install --legacy-peer-deps
      
      - name: ✅ 依赖安装验证
        run: |
          echo "✅ 依赖安装成功，共安装 $(ls node_modules | wc -l) 个依赖包"

      - name: 🏗️ 构建 React 应用
        run: npm run build
      
      - name: ✅ 构建产物验证
        run: |
          if [ ! -d "build" ]; then 
            echo "❌ 构建失败：build目录不存在"
            exit 1
          fi
          if [ ! -f "build/index.html" ]; then
            echo "❌ 构建失败：index.html不存在"
            exit 1
          fi
          echo "✅ 构建成功，build目录大小：$(du -sh build | cut -f1)"
          echo "✅ 包含文件数：$(find build -type f | wc -l)"
          ls -la build/

      - name: 🔑 配置SSH连接密钥
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.ALIYUN_ECS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 8.160.183.109 >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
      
      - name: ✅ SSH连接验证
        run: |
          if ssh -o ConnectTimeout=10 root@8.160.183.109 "echo '连接成功'"; then
            echo "✅ SSH连接服务器成功"
            echo "✅ 服务器系统：$(ssh root@8.160.183.109 "cat /etc/os-release | grep PRETTY_NAME | cut -d'\"' -f2")"
          else
            echo "❌ SSH连接服务器失败，请检查密钥和网络配置"
            exit 1
          fi

      - name: 📂 初始化服务器部署目录
        run: |
          ssh root@8.160.183.109 "mkdir -p /app/vex-main && chown -R root:root /app/vex-main && chmod -R 755 /app/vex-main"
      
      - name: ✅ 部署目录验证
        run: |
          if ssh root@8.160.183.109 "[ -d /app/vex-main ]"; then
            echo "✅ 部署目录 /app/vex-main 已存在且权限正常"
          else
            echo "❌ 部署目录创建失败"
            exit 1
          fi

      - name: 📤 上传构建产物到服务器
        run: |
          echo "🚀 开始上传文件..."
          scp -o StrictHostKeyChecking=no -r build/* root@8.160.183.109:/app/vex-main/
      
      - name: ✅ 文件上传验证
        run: |
          REMOTE_FILE_COUNT=$(ssh root@8.160.183.109 "find /app/vex-main -type f | wc -l")
          LOCAL_FILE_COUNT=$(find build -type f | wc -l)
          if [ "$REMOTE_FILE_COUNT" -eq "$LOCAL_FILE_COUNT" ]; then
            echo "✅ 文件上传完成，共上传 $REMOTE_FILE_COUNT 个文件"
            echo "✅ 远程目录大小：$(ssh root@8.160.183.109 "du -sh /app/vex-main | cut -f1")"
          else
            echo "❌ 文件上传不完整，本地 $LOCAL_FILE_COUNT 个文件，远程只有 $REMOTE_FILE_COUNT 个"
            exit 1
          fi

      - name: 🔄 重载Nginx配置
        run: |
          ssh root@8.160.183.109 "nginx -s reload"
      
      - name: ✅ Nginx重载验证
        run: |
          if ssh root@8.160.183.109 "nginx -t"; then
            echo "✅ Nginx配置重载成功，运行状态正常"
          else
            echo "❌ Nginx配置重载失败，请检查配置"
            exit 1
          fi

      - name: 🎉 部署完成
        run: |
          echo "============================================="
          echo "✅  部署成功！🎉"
          echo "🌐  访问地址：http://8.160.183.109"
          echo "🌐  域名访问：http://vexruna.top"
          echo "⏰  部署时间：$(date '+%Y-%m-%d %H:%M:%S')"
          echo "============================================="
